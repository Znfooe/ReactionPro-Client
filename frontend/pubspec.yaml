name: reaction_time_test
description: "ReactionPro - 反应力与击杀时间测试网站（Flutter Web/移动/桌面）"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.6.0
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  window_manager: ^0.5.1
  fl_chart: ^0.69.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cupertino_icons: ^1.0.8
  simple_icons: ^16.23.0
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  package_info_plus: ^8.3.1
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.4.4
  json_serializable: ^6.9.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/home/anime-girl.png
    - assets/images/author/payment-code.jpg
    - assets/images/author/qq-friend-code-v2.jpg
  fonts:
    - family: CangErYuMoW01
      fonts:
        - asset: assets/fonts/cangeryumo-w01.ttf
    - family: CangErYuMoW02
      fonts:
        - asset: assets/fonts/cangeryumo-w02.ttf
    - family: CangErYuMoW03
      fonts:
        - asset: assets/fonts/cangeryumo-w03.ttf
    - family: CangErYuMoW04
      fonts:
        - asset: assets/fonts/cangeryumo-w04.ttf
    - family: CangErYuMoW05
      fonts:
        - asset: assets/fonts/cangeryumo-w05.ttf
